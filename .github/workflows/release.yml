name: Release — build server binaries

# Triggered when a draft release is published, or manually.
# The local pipeline creates the draft release with models + plugin,
# then this workflow builds server binaries on native runners and
# uploads them to the same release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SOURCE_REPO: https://codeberg.org/melolouqa/culm.git
  # ORT shared library versions — bundled alongside the binary.
  # The binary uses load-dynamic (no ORT linked at build time).
  ORT_VERSION: "1.24.4"
  ORT_VERSION_MIGRAPHX: "1.24.2"

jobs:
  # ── Build ──────────────────────────────────────────────────────────
  # One binary per platform (load-dynamic = no GPU SDK needed).
  # Multiple GPU variants per platform share the same binary but bundle
  # a different ORT shared library.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-cuda
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-x86_64-cuda
            archive: tar.gz
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-gpu-1.24.4.tgz
            ort_lib: lib/libonnxruntime.so

          - name: linux-x86_64-rocm
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-x86_64-rocm
            archive: tar.gz
            ort_url: https://github.com/Looong01/onnxruntime-rocm-build/releases/download/v1.24.2/onnxruntime-linux-x64-migraphx-1.24.2.tgz
            ort_lib: lib/libonnxruntime.so

          - name: linux-x86_64-cpu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-x86_64
            archive: tar.gz
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
            ort_lib: lib/libonnxruntime.so

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-aarch64
            archive: tar.gz
            cross: true
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-aarch64-1.24.4.tgz
            ort_lib: lib/libonnxruntime.so

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            binary: culm-server
            bare_name: culm-server-darwin-x86_64
            archive: tar.gz
            ort_url: ""
            ort_lib: ""

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: culm-server
            bare_name: culm-server-darwin-aarch64
            archive: tar.gz
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-arm64-1.24.4.tgz
            ort_lib: lib/libonnxruntime.dylib

          - name: windows-x86_64-cuda
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: culm-server.exe
            bare_name: culm-server-windows-x86_64-cuda
            archive: zip
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-gpu-1.24.4.zip
            ort_lib: lib/onnxruntime.dll

          - name: windows-x86_64-cpu
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: culm-server.exe
            bare_name: culm-server-windows-x86_64
            archive: zip
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-1.24.4.zip
            ort_lib: lib/onnxruntime.dll

    steps:
      - uses: actions/checkout@v5

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone source
        shell: bash
        run: |
          git clone --depth 1 --branch main "$SOURCE_REPO" source

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/server
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cd source && cross build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}
          else
            cd source && cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}
          fi

      # Download pre-built ORT shared library (CUDA/ROCm/CPU variant)
      - name: Download ORT library
        if: matrix.ort_url != ''
        shell: bash
        run: |
          mkdir -p ort-download
          echo "Downloading ${{ matrix.ort_url }}..."
          curl -fL "${{ matrix.ort_url }}" -o ort-archive

          # Extract — handles both .tgz and .zip
          if [[ "${{ matrix.ort_url }}" == *.tgz ]] || [[ "${{ matrix.ort_url }}" == *.tar.gz ]]; then
            tar xzf ort-archive -C ort-download
          else
            unzip -q ort-archive -d ort-download
          fi

          # Find the lib directory and collect all shared libraries.
          # ORT archives contain symlinks (libonnxruntime.so → .so.1.24.x)
          # and provider libs (libonnxruntime_providers_cuda.so, etc.)
          # that must all be bundled for GPU support to work at runtime.
          LIB_DIR=$(find ort-download -type d -name lib | head -1)
          if [ -z "$LIB_DIR" ]; then
            echo "ERROR: Could not find lib/ directory in ORT archive"
            find ort-download -type f -o -type l
            exit 1
          fi

          mkdir -p ort-libs
          # Copy shared libraries, resolving symlinks into concrete copies.
          # Matches .so, .so.1, .so.1.24.4, .dylib, .dll — skips .dSYM dirs.
          for f in "$LIB_DIR"/*; do
            [ -f "$f" ] || [ -L "$f" ] || continue
            BASENAME=$(basename "$f")
            case "$BASENAME" in
              *.so|*.so.*|*.dylib|*.dll) ;;
              *) continue ;;
            esac
            cp -L "$f" "ort-libs/$BASENAME"
            echo "  bundling $BASENAME"
          done

          ls -la ort-libs/
          echo "ORT_LIBS_DIR=ort-libs" >> "$GITHUB_ENV"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="culm-server-${TAG}-${{ matrix.name }}.tar.gz"
          BARE="${{ matrix.bare_name }}"
          BIN="source/server/target/${{ matrix.target }}/release/${{ matrix.binary }}"

          # Bare binary for ReaPack
          cp "$BIN" "$BARE"

          # Tarball: binary + models.json + ORT libraries
          mkdir staging
          cp "$BIN" staging/
          cp source/models.json staging/
          if [ -d "${ORT_LIBS_DIR:-}" ]; then
            cp "$ORT_LIBS_DIR"/* staging/
          fi
          tar czf "$ARCHIVE" -C staging .

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "BARE=$BARE" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="culm-server-${TAG}-${{ matrix.name }}.zip"
          BARE="${{ matrix.bare_name }}"
          BIN="source/server/target/${{ matrix.target }}/release/${{ matrix.binary }}"

          # Bare binary for ReaPack
          cp "$BIN" "$BARE"

          # Zip: binary + models.json + ORT libraries
          mkdir staging
          cp "$BIN" staging/
          cp source/models.json staging/
          if [ -d "${ORT_LIBS_DIR:-}" ]; then
            cp "$ORT_LIBS_DIR"/* staging/
          fi
          cd staging && 7z a -tzip "../$ARCHIVE" . && cd ..

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "BARE=$BARE" >> "$GITHUB_ENV"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Get release ID (supports drafts)
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
          import json, sys
          releases = json.load(sys.stdin)
          r = next((r for r in releases if r['tag_name'] == '${TAG}'), None)
          if r: print(r['id'])
          else: sys.exit(1)
          ")

          for FILE in "$ARCHIVE" "$BARE"; do
            NAME=$(basename "$FILE")
            echo "Uploading $NAME..."

            # Delete existing asset if present (--clobber equivalent)
            EXISTING=$(curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?per_page=100" \
              | python3 -c "
          import json, sys
          assets = json.load(sys.stdin)
          a = next((a for a in assets if a['name'] == '${NAME}'), None)
          print(a['id'] if a else '')
          ")
            if [ -n "$EXISTING" ]; then
              curl -sf -X DELETE \
                -H "Authorization: token ${GH_TOKEN}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${EXISTING}" || true
            fi

            curl -f \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${FILE}" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${NAME}"
            echo "  ok"
          done
