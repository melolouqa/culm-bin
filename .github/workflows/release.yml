name: Release — build server binaries

# Triggered when a draft release is published, or manually.
# The local pipeline creates the draft release with models + plugin,
# then this workflow builds server binaries on native runners and
# uploads them to the same release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SOURCE_REPO: https://codeberg.org/melolouqa/culm.git
  ORT_VERSION: "1.24.4"
  ORT_VERSION_MIGRAPHX: "1.24.2"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-x86_64
            archive: tar.gz
            ort_variants: |
              cuda https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-gpu-1.24.4.tgz
              rocm https://github.com/Looong01/onnxruntime-rocm-build/releases/download/v1.24.2/onnxruntime-linux-x64-migraphx-1.24.2.tgz
              cpu https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: culm-server
            bare_name: culm-server-linux-aarch64
            archive: tar.gz
            cross: true
            ort_variants: |
              cpu https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-aarch64-1.24.4.tgz

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: culm-server
            bare_name: culm-server-darwin-aarch64
            archive: tar.gz
            ort_variants: |
              cpu https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-arm64-1.24.4.tgz

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: culm-server.exe
            bare_name: culm-server-windows-x86_64
            archive: zip
            ort_variants: |
              cuda https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-gpu-1.24.4.zip
              cpu https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-1.24.4.zip

    steps:
      - uses: actions/checkout@v5

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone source
        shell: bash
        run: |
          git clone --depth 1 --branch main "$SOURCE_REPO" source

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/server
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cd source && cross build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}
          else
            cd source && cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}
          fi

      # Download all ORT variants into ort/<variant>/ and collect
      # individual library files for ReaPack upload.
      - name: Download ORT libraries
        shell: bash
        run: |
          mkdir -p staging-ort
          # Track individual files for upload (variant-prefixed names)
          ORT_UPLOAD_FILES=""

          echo '${{ matrix.ort_variants }}' | while read -r VARIANT URL; do
            [ -z "$VARIANT" ] && continue
            echo "=== ORT variant: $VARIANT ==="

            mkdir -p "ort-dl-$VARIANT"
            curl -fL "$URL" -o "ort-archive-$VARIANT"

            if [[ "$URL" == *.tgz ]] || [[ "$URL" == *.tar.gz ]]; then
              tar xzf "ort-archive-$VARIANT" -C "ort-dl-$VARIANT"
            else
              unzip -q "ort-archive-$VARIANT" -d "ort-dl-$VARIANT"
            fi

            LIB_DIR=$(find "ort-dl-$VARIANT" -type d -name lib | head -1)
            if [ -z "$LIB_DIR" ]; then
              echo "ERROR: no lib/ in $VARIANT archive"
              find "ort-dl-$VARIANT" -type f -o -type l
              exit 1
            fi

            mkdir -p "staging-ort/$VARIANT"
            for f in "$LIB_DIR"/*; do
              [ -f "$f" ] || [ -L "$f" ] || continue
              BASENAME=$(basename "$f")
              case "$BASENAME" in
                *.so|*.so.*|*.dylib|*.dll) ;;
                *) continue ;;
              esac
              cp -L "$f" "staging-ort/$VARIANT/$BASENAME"

              # For ReaPack individual uploads, skip versioned copies
              # (e.g. libonnxruntime.so.1, .so.1.24.4) — they're redundant
              # since init_ort() loads via explicit path.
              case "$BASENAME" in
                *.so.[0-9]*|*.dylib.[0-9]*) continue ;;
              esac

              UPLOAD_NAME="ort--${{ matrix.name }}--${VARIANT}--${BASENAME}"
              cp -L "$f" "$UPLOAD_NAME"
              echo "$UPLOAD_NAME" >> ort-upload-list.txt
              echo "  $BASENAME → $UPLOAD_NAME"
            done

            rm -rf "ort-dl-$VARIANT" "ort-archive-$VARIANT"
          done

          echo "=== ORT staging ==="
          find staging-ort -type f | sort

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="culm-server-${TAG}-${{ matrix.name }}.tar.gz"
          BARE="${{ matrix.bare_name }}"
          BIN="source/server/target/${{ matrix.target }}/release/${{ matrix.binary }}"

          cp "$BIN" "$BARE"

          mkdir staging
          cp "$BIN" staging/
          cp source/models.json staging/
          if [ -d staging-ort ]; then
            cp -r staging-ort staging/ort
          fi
          tar czf "$ARCHIVE" -C staging .

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "BARE=$BARE" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="culm-server-${TAG}-${{ matrix.name }}.zip"
          BARE="${{ matrix.bare_name }}"
          BIN="source/server/target/${{ matrix.target }}/release/${{ matrix.binary }}"

          cp "$BIN" "$BARE"

          mkdir staging
          cp "$BIN" staging/
          cp source/models.json staging/
          if [ -d staging-ort ]; then
            cp -r staging-ort staging/ort
          fi
          cd staging && 7z a -tzip "../$ARCHIVE" . && cd ..

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "BARE=$BARE" >> "$GITHUB_ENV"

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "
          import json, sys
          releases = json.load(sys.stdin)
          r = next((r for r in releases if r['tag_name'] == '${TAG}'), None)
          if r: print(r['id'])
          else: sys.exit(1)
          ")

          # Collect all files to upload: archive, bare binary, individual ORT libs
          UPLOAD_LIST="$ARCHIVE $BARE"
          if [ -f ort-upload-list.txt ]; then
            UPLOAD_LIST="$UPLOAD_LIST $(cat ort-upload-list.txt | tr '\n' ' ')"
          fi

          for FILE in $UPLOAD_LIST; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            echo "Uploading $NAME..."

            EXISTING=$(curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?per_page=100" \
              | python3 -c "
          import json, sys
          assets = json.load(sys.stdin)
          a = next((a for a in assets if a['name'] == '${NAME}'), None)
          print(a['id'] if a else '')
          ")
            if [ -n "$EXISTING" ]; then
              curl -sf -X DELETE \
                -H "Authorization: token ${GH_TOKEN}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${EXISTING}" || true
            fi

            curl -f \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${FILE}" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${NAME}"
            echo "  ok"
          done
